services:
  - type: web
    name: coaching-backend
    env: node
    plan: free
    region: oregon
    buildCommand: npm run build
    startCommand: npm start
    repo: https://github.com/h77107405-netizen/second
    branch: main
    root: apps/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'
      - key: DATABASE_URL
        fromDatabase:
          name: postgres
      - key: JWT_SECRET
        generate: true
